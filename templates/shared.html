<!DOCTYPE html>
<html>

<head>

    <title>Secure Shared File</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-page">

    <div class="login-card">

        <h2>
            🔗 Secure Shared File
        </h2>

        <p class="shared-info">
            End-to-End Encrypted Access
        </p>

        <form id="sharedForm">

            <input type="password"
                   id="share_password"
                   placeholder="Share Password"
                   required>

            <input type="password"
                   id="file_password"
                   placeholder="File Password"
                   required>

            <button type="submit"
                    id="downloadBtn">

                Download Secure File

            </button>

        </form>

    </div>

</div>

<script>

// =====================================
// POPUP
// =====================================

function showPopup(
    message,
    success=true
) {

    const popup =
        document.createElement("div");

    popup.className =
        "success-popup";

    popup.innerHTML =
        message;

    if (!success) {

        popup.style.background =
            "#ff4b5c";

    }

    document.body.appendChild(
        popup
    );

    setTimeout(() => {

        popup.remove();

    }, 4000);

}

// =====================================
// SHARED DOWNLOAD
// =====================================

document.getElementById(
    "sharedForm"
).addEventListener(

    "submit",

    async function(e) {

        e.preventDefault();

        const share_password =
            document.getElementById(
                "share_password"
            ).value;

        const file_password =
            document.getElementById(
                "file_password"
            ).value;

        // =========================
        // BUTTON LOADING
        // =========================

        const btn =
            document.getElementById(
                "downloadBtn"
            );

        btn.innerHTML =
            "Decrypting...";

        btn.disabled = true;

        try {

            // =========================
            // SEND PASSWORDS
            // =========================

            const response =
                await fetch(

                    window.location.pathname,

                    {

                        method: "POST",

                        headers: {

                            "Content-Type":
                            "application/x-www-form-urlencoded"

                        },

                        body:

                        `share_password=${encodeURIComponent(share_password)}&file_password=${encodeURIComponent(file_password)}`

                    }

                );

            const data =
                await response.json();

            // =========================
            // SERVER ERROR
            // =========================

            if (!data.success) {

                btn.innerHTML =
                    "Download Secure File";

                btn.disabled = false;

                showPopup(
                    data.error,
                    false
                );

                return;
            }

            // =========================
            // BASE64 → BUFFER
            // =========================

            const binary =
                atob(data.file);

            const bytes =
                new Uint8Array(
                    binary.length
                );

            for (
                let i = 0;
                i < binary.length;
                i++
            ) {

                bytes[i] =
                    binary.charCodeAt(i);

            }

            const encryptedBuffer =
                bytes.buffer;

            // =========================
            // IV
            // =========================

            const iv =
                new Uint8Array(

                    JSON.parse(data.iv)

                );

            // =========================
            // CREATE AES KEY
            // =========================

            const aesKey =
                await window.crypto.subtle.importKey(

                    "raw",

                    new TextEncoder().encode(
                        file_password.padEnd(32, "0").slice(0,32)
                    ),

                    {
                        name:"AES-GCM"
                    },

                    false,

                    ["decrypt"]

                );

            // =========================
            // DECRYPT
            // =========================

            const decrypted =
                await window.crypto.subtle.decrypt(

                    {
                        name: "AES-GCM",

                        iv: iv
                    },

                    aesKey,

                    encryptedBuffer

                );

            // =========================
            // DOWNLOAD
            // =========================

            const blob =
                new Blob([decrypted]);

            const url =
                window.URL.createObjectURL(
                    blob
                );

            const a =
                document.createElement("a");

            a.href = url;

            a.download =
                data.filename.replace(
                    ".enc",
                    ""
                );

            document.body.appendChild(a);

            a.click();

            a.remove();

            // =========================
            // SUCCESS
            // =========================

            showPopup(
                "✅ Secure file decrypted successfully"
            );

        }

        catch {

            showPopup(
                "❌ Wrong file password",
                false
            );

        }

        // =========================
        // RESET BUTTON
        // =========================

        btn.innerHTML =
            "Download Secure File";

        btn.disabled = false;

    }

);

</script>

</body>

</html>
