<!DOCTYPE html>
<html>

<head>

    <title>Recovered Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-page">

    <div class="login-card">

        <h2>
            🔓 File Password Recovered
        </h2>

        <div class="flash-message">

            File:
            <b>{{ filename }}</b>

            <br><br>

            Password:

            <b>{{ recovered_password }}</b>

        </div>

        <a href="/dashboard">

            <button>

                Back to Dashboard

            </button>

        </a>

    </div>

</div>

</body>

</html>
