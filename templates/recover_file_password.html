<!DOCTYPE html>
<html>

<head>

    <title>Recover File Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-page">

    <div class="login-card">

        <h2>
            🔐 Recover File Password
        </h2>

        <!-- FLASH MESSAGES -->

        {% with messages = get_flashed_messages() %}
            {% if messages %}

                {% for message in messages %}

                    <div class="flash-message">

                        {{ message }}

                    </div>

                {% endfor %}

            {% endif %}
        {% endwith %}

        <!-- OTP FORM -->

        <form method="POST">

            <input type="text"
                   name="otp"
                   placeholder="Enter OTP"
                   required>

            <button type="submit">

                Verify OTP

            </button>

        </form>

        <p>

            OTP sent for file:

            <b>{{ filename }}</b>

        </p>

    </div>

</div>

</body>

</html>
