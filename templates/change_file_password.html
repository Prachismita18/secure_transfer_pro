<!DOCTYPE html>
<html>

<head>

    <title>Change File Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-page">

    <div class="login-card">

        <h2>
            🔄 Change File Password
        </h2>

        <div class="flash-message">

            File:
            <b>{{ filename }}</b>

        </div>

        <input type="password"
               id="oldPassword"
               placeholder="Old Password">

        <br><br>

        <input type="password"
               id="newPassword"
               placeholder="New Password">

        <br><br>

        <button onclick="changePassword()">

            Change Password

        </button>

        <br><br>

        <a href="/dashboard">

            Back to Dashboard

        </a>

    </div>

</div>

<script>

async function changePassword(){

    const oldPassword =
        document.getElementById(
            "oldPassword"
        ).value;

    const newPassword =
        document.getElementById(
            "newPassword"
        ).value;

    if(!oldPassword || !newPassword){

        alert(
            "Enter all fields ❌"
        );

        return;

    }

    // =========================
    // FETCH ENCRYPTED FILE
    // =========================

    const response =
        await fetch(

            `/download/{{ filename }}`

        );

    const data =
        await response.json();

    // =========================
    // BASE64 TO BUFFER
    // =========================

    const binary =
        atob(data.file);

    const bytes =
        new Uint8Array(
            binary.length
        );

    for(let i=0; i<binary.length; i++){

        bytes[i] =
            binary.charCodeAt(i);

    }

    const encryptedBuffer =
        bytes.buffer;

    // =========================
    // IV
    // =========================

    const iv =
        new Uint8Array(
            JSON.parse(data.iv)
        );

    try{

        // =========================
        // CREATE OLD KEY
        // =========================

        const oldKey =
            await crypto.subtle.importKey(

                "raw",

                new TextEncoder().encode(
                    oldPassword.padEnd(32, "0").slice(0,32)
                ),

                {
                    name:"AES-GCM"
                },

                false,

                ["decrypt"]

            );

        // =========================
        // DECRYPT USING OLD PASSWORD
        // =========================

        const decrypted =
            await crypto.subtle.decrypt(

                {
                    name:"AES-GCM",
                    iv:iv
                },

                oldKey,

                encryptedBuffer

            );

        // =========================
        // NEW IV
        // =========================

        const newIv =
            crypto.getRandomValues(
                new Uint8Array(12)
            );

        // =========================
        // CREATE NEW KEY
        // =========================

        const newKey =
            await crypto.subtle.importKey(

                "raw",

                new TextEncoder().encode(
                    newPassword.padEnd(32, "0").slice(0,32)
                ),

                {
                    name:"AES-GCM"
                },

                false,

                ["encrypt"]

            );

        // =========================
        // RE-ENCRYPT FILE
        // =========================

        const reEncrypted =
            await crypto.subtle.encrypt(

                {
                    name:"AES-GCM",
                    iv:newIv
                },

                newKey,

                decrypted

            );

        // =========================
        // SEND UPDATED FILE
        // =========================

        const formData =
            new FormData();

        formData.append(

            "file",

            new Blob([reEncrypted]),

            "{{ filename }}"

        );

        formData.append(

            "iv",

            JSON.stringify(
                Array.from(newIv)
            )

        );

        formData.append(

            "file_password",

            newPassword

        );

        const replaceResponse =
            await fetch(

                `/replace-file/{{ filename }}`,

                {

                    method:"POST",

                    body:formData

                }

            );

        const result =
            await replaceResponse.json();

        alert(
            result.message
        );

        if(result.success){

            window.location.href =
                "/dashboard";

        }

    }

    catch{

        alert(
            "Old password incorrect ❌"
        );

    }

}

</script>
</body>

</html>
