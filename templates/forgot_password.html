<!DOCTYPE html>
<html>

<head>

    <title>Forgot Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-page">

    <div class="login-card">

        <h2>
            🔑 Forgot Password
        </h2>

        <!-- FLASH MESSAGES -->

        {% with messages = get_flashed_messages() %}
            {% if messages %}

                {% for message in messages %}

                    <div class="flash-message">

                        {{ message }}

                    </div>

                {% endfor %}

            {% endif %}
        {% endwith %}

        <!-- EMAIL FORM -->

        <form method="POST">

            <input type="email"
                   name="email"
                   placeholder="Enter your email"
                   required>

            <button type="submit">

                Send OTP

            </button>

        </form>

        <p>

            <a href="/">
                Back to Login
            </a>

        </p>

    </div>

</div>

</body>

</html>
